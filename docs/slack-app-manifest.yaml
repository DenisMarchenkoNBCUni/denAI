display_information:
  name: denAI
  description: Your internal AI-powered engineering assistant. Ask questions about Jira issues, Confluence docs, GitHub repos, internal documentation, and more — all from Slack. Mention @denai in any channel or send a DM to get started.
  background_color: "#1F2937"
features:
  bot_user:
    display_name: denai
    always_online: true
oauth_config:
  scopes:
    bot:
      - app_mentions:read
      - channels:history
      - chat:write
      - groups:history
      - im:history
      - im:read
      - im:write
      - mpim:history
      - reactions:write
      - users:read
settings:
  event_subscriptions:
    bot_events:
      - app_home_opened
      - app_mention
      - message.im
  interactivity:
    is_enabled: false
  socket_mode_enabled: true
  token_rotation_enabled: false
