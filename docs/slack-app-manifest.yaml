display_information:
  name: denAI
  description: Internal AI assistant — answers Jira, Confluence, DevDoc, GitHub, and Slack questions. Denis Marchenko hackathon project.
  background_color: "#1F2937"
features:
  bot_user:
    display_name: denai
    always_online: true
oauth_config:
  scopes:
    bot:
      - app_mentions:read
      - channels:history
      - chat:write
      - groups:history
      - im:history
      - im:read
      - im:write
      - mpim:history
      - reactions:write
      - users:read
settings:
  event_subscriptions:
    bot_events:
      - app_mention
      - message.im
  interactivity:
    is_enabled: false
  socket_mode_enabled: true
  token_rotation_enabled: false
